<footer id="masterFooter" class="site-footer h-card">
    <data class="u-url" href="{{ '/' | relative_url }}"></data>

    <!-- <div class="wrapper">

        <div class="social-links">
            {%- include social.html -%}
        </div>

    </div> -->

    <!--<p style="font-style: italic;">aesthetihawkc v3.0rc1.1</p>-->

    <div class="footer-links">
        <div class="footer-previous">
            {% unless page.footer.previous == nil %}
                <a class="footer-navigation footer-previous-link" href="{{ page.footer.previous | relative_url }}">
                    <button class="footer-previous-btn medium filledTinted primary">
                        ← Previous Page
                    </button>
                </a>
            {% endunless %}
        </div>

        <div class="footer-home">
            {% unless page.footer.home == nil %}
                <a class="footer-navigation footer-home-link" href="{{ page.footer.home | relative_url }}">
                    <button class="footer-home-btn medium filledTinted primary">
                        🏠︎ Home Page
                    </button>
                </a>
            {% endunless %}
        </div>

        <div class="footer-next">
            {% unless page.footer.next == nil %}
                <a class="footer-navigation footer-next-link" href="{{ page.footer.next | relative_url }}">
                    <button class="footer-next-btn medium filledTinted primary">
                        → Next Page
                    </button>
                </a>
            {% endunless %}
        </div>
    </div>

</footer>

<script>
    // Run after theme CSS loads to enforce site background and text color
    (function(){
        try{
            var theme = localStorage.getItem('theme') || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if(theme === 'dark'){
                document.documentElement.style.backgroundColor = '#0b0f14';
                document.body.style.backgroundColor = '#0b0f14';
                document.body.style.color = '#e6eef5';
            } else {
                document.documentElement.style.backgroundColor = '#ffffff';
                document.body.style.backgroundColor = '#ffffff';
                document.body.style.color = '#0b1220';
            }
        }catch(e){console.warn(e)}
    })();
</script>
